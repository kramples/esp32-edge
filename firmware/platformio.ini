; PlatformIO Project Configuration File
; https://docs.platformio.org/page/projectconf.html

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino

; Must match Serial.begin() in src/main.cpp
monitor_speed = 115200
; 921600 works on most ESP32 dev boards; drop to 460800 if uploads fail
upload_speed = 921600

; Pinned dependencies (SemVer caret ranges: bugfix/minor updates allowed,
; breaking major versions are not)
lib_deps =
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.4.0
    adafruit/Adafruit SSD1306@^2.5.13
    adafruit/Adafruit GFX Library@^1.11.11
    adafruit/Adafruit Unified Sensor@^1.1.15
    adafruit/DHT sensor library@^1.4.6

build_flags =
    -Wall
    ; PubSubClient default buffer (256 B) is too small for TLS + JSON telemetry
    -D MQTT_MAX_PACKET_SIZE=1024
